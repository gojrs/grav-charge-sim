name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -o client/sim.wasm ./wasm/

      - name: Verify WASM binary exists
        run: test -f client/sim.wasm && echo "WASM build OK"
